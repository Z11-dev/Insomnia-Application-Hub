<!DOCTYPE html>
<html>
<head>
<title>Application Portal</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<header>Application Portal</header>

<div class="container">
<div class="box">

<h3>Username</h3>
<input id="username">

<h3>Discord Username</h3>
<input id="discord">

<h3>Why do you want to work at Insomnia Cookies RBLX?</h3>
<textarea id="why"></textarea>

<h3>What traits will you bring to the team?</h3>
<textarea id="traits"></textarea>

<h3>What division do you want to join?</h3>
<select id="division">
    <option>Cookie Administration</option>
    <option>Sweet Relations</option>
    <option>Kitchen Safety</option>
</select>

<h3>Do you have any past experience?</h3>
<textarea id="experience"></textarea>

<h3>Do you understand that you must be active?</h3>
<select id="activity">
    <option>Yes</option>
    <option>No</option>
</select>

<button onclick="submitApp()">Submit Application</button>

</div>
</div>

</body>
</html>
